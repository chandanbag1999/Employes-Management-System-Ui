<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge background - rounded rectangle -->
  <rect x="20" y="20" width="160" height="160" rx="20" ry="20" fill="#8B5CF6"/>

  <!-- Inner white background for badge -->
  <rect x="30" y="30" width="140" height="140" rx="15" ry="15" fill="#FFFFFF"/>

  <!-- Person icon - head -->
  <circle cx="100" cy="70" r="20" fill="#8B5CF6"/>

  <!-- Person icon - body (torso and shoulders) -->
  <ellipse cx="100" cy="115" rx="28" ry="35" fill="#8B5CF6"/>

  <!-- Checkmark overlay - represents verification/management -->
  <g transform="translate(120, 130)">
    <!-- Checkmark circle background -->
    <circle cx="0" cy="0" r="18" fill="#6D28D9" opacity="0.9"/>
    <!-- Checkmark -->
    <path d="M -8 -2 L -2 4 L 10 -8" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top accent bar - represents organization -->
  <rect x="30" y="30" width="140" height="6" rx="3" ry="3" fill="#8B5CF6" opacity="0.3"/>
</svg>